# https://render.com/docs/blueprint-spec
#
# This service is set up for Render with Root Directory = my-backend (shim folder).
# The real app lives at the repo root (../package.json, ../server.js, ../dist).
#
# To deploy from repo root instead: remove rootDir, delete the my-backend/ folder,
# and use buildCommand / startCommand from the root package.json.
#
services:
  - type: web
    name: grt-pit-ui
    runtime: node
    plan: free
    rootDir: my-backend
    # Root `npm install` alone skips devDependencies when NODE_ENV=production, so Vite is missing and dist/ is never built.
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
